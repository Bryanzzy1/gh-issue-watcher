# gfi-monitor configuration — this file is NON-secret and safe to commit/edit.
#
# `defaults` apply to every repo. Any repo under `repos:` may override any
# default key by simply listing it again with a new value.
#
# The repos below are all CUDA- or ML-focused (C++ / Python / CUDA), verified
# on 2026-07-15 to be actively maintained (pushed within days), NOT archived,
# and to have a real history of beginner-friendly issues. The number in the
# comment after each repo is how many OPEN "good first issue" (gfi) and
# "help wanted" (hw) issues it had at verification time — a rough signal of how
# often you'll get hits. Repos marked "(watch)" had 0 matching-label issues open
# right then but are active with issue history, so they'll surface matches as
# maintainers tag new ones. Tune freely.

defaults:
  labels_any:              # an issue matches if it has ANY of these labels
    - good first issue
    - help wanted
  require_unassigned: true       # skip issues that already have an assignee
  require_no_linked_pr: true     # skip issues that appear to have a linked PR
  max_age_days: 120              # skip issues not updated within this many days
  min_age_days: 0                # skip issues NEWER than this (0 = no lower bound)

repos:
  # ---- NVIDIA CUDA libraries ----
  - {owner: NVIDIA, name: cccl}              # gfi=19 hw=7   (CUDA C++ core libs)
  - {owner: NVIDIA, name: cutlass}           # gfi=2  hw=4   (CUDA GEMM templates)
  - {owner: NVIDIA, name: DALI}              # gfi=2  hw=26  (data loading, C++/Py)
  - {owner: NVIDIA, name: raft}              # gfi=2  hw=0   (ML/DS primitives)
  - {owner: NVIDIA, name: cuvs}              # (watch) vector search
  - {owner: NVIDIA, name: TensorRT}          # (watch) inference optimizer
  - {owner: NVIDIA, name: TensorRT-LLM}      # (watch) LLM inference
  - {owner: NVIDIA, name: cuda-python}       # (watch) CUDA Python bindings
  - {owner: NVIDIA, name: warp}              # (watch) Python GPU kernels
  - {owner: NVIDIA, name: nccl}              # (watch) multi-GPU collectives

  # ---- RAPIDS (GPU data science) ----
