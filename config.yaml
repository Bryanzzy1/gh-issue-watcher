# gfi-monitor configuration. This file is non-secret and safe to commit and edit.
#
# `defaults` apply to every repo. Any repo under `repos:` can override any
# default key by listing it again with a new value.
#
# All repos are ML, CUDA, or scientific/numeric focused (C++, Python, CUDA,
# some Rust). Verified on 2026-07-15 to exist, be actively maintained (recent
# push, not archived), and have beginner-issue history. The number after each
# repo is how many open beginner-ish issues it had at check time across the
# labels below. "(watch)" means 0 were open then but the repo is active, so
# matches appear as maintainers tag new issues.

defaults:
  labels_any:              # an issue matches if it has ANY of these labels
    # Matching is case-insensitive, so no need to list both cases. Hyphenated
    # and reworded variants are separate strings, so they are listed explicitly.
    - good first issue
    - good-first-issue
    - help wanted
    - help-wanted
    - good second issue    # next level up from beginner
    - easy
    - "difficulty: easy"   # quoted: a colon in an unquoted item makes YAML a dict
    - good for beginners
    - up for grabs
    - newcomer
    - newcomer-only
    - new contributor
    - contributions welcome
    - contribution welcome
    - contributions-welcome
    - contribution-welcome
  require_unassigned: true       # skip issues that already have an assignee
  require_no_linked_pr: true     # skip issues that appear to have a linked PR
  max_age_days: 90               # skip issues not updated within the last 3 months
  min_age_days: 0                # skip issues newer than this (0 means no lower bound)

