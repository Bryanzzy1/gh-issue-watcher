  - {owner: rapidsai, name: cuml}            # gfi=16 hw=0   (GPU ML)
  - {owner: rapidsai, name: rmm}             # gfi=2  hw=0   (GPU memory mgmt)
  - {owner: rapidsai, name: kvikio}          # gfi=1  hw=0   (GPU-direct IO)
  - {owner: rapidsai, name: cugraph}         # (watch) GPU graph analytics

  # ---- PyTorch ecosystem ----
