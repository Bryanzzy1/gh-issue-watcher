name: gfi-monitor

# Runs on GitHub's servers, so it does not depend on any local machine.
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours, UTC
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

# Needed so the job can commit the updated seen.json back to the repo.
permissions:
  contents: write

# Never run two copies at once. They would race on seen.json.
concurrency:
  group: gfi-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run monitor
        env:
          # Use the personal token secret GH_API_TOKEN if set (5,000 req/hr),
          # otherwise fall back to the built-in token (1,000 req/hr). With 100
          # repos the personal token gives useful headroom.
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN || secrets.GITHUB_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python monitor.py

      - name: Persist seen.json
        # seen.json is git-ignored for local use, so force-add it here.
        # Retry with rebase in case a push landed while the job was running.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen.json || true
          if git diff --cached --quiet; then
            echo "No seen.json changes to commit."
            exit 0
          fi
          git commit -m "Update seen.json [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected, rebasing and retrying (attempt $attempt)."
            git pull --rebase --autostash origin main || true
          done
          echo "Could not push seen.json after retries."
          exit 1
